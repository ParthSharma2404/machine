name: YieldPulse Daily X Bot

on:
  schedule:
    # Runs at 14:00 UTC every day (which is 9:00 AM EST / 10:00 AM EDT)
    - cron: '0 14 * * *'
  workflow_dispatch: # Allows you to run the script manually from the GitHub Actions tab

jobs:
  post-tweet:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: 'bot/package-lock.json'

      - name: Install dependencies
        working-directory: ./bot
        run: npm install

      - name: Run Bot Script
        working-directory: ./bot
        env:
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
        run: node bot.js
