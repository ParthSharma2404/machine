<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>YieldPulse Auto-Poster</title>
  <style>
    body {
      width: 320px;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background-color: #f8fafc;
      color: #0f172a;
    }
    .header {
      background-color: #ffffff;
      padding: 16px;
      border-bottom: 1px solid #e2e8f0;
      text-align: center;
    }
    .header h1 {
      margin: 0;
      font-size: 18px;
      font-weight: 700;
      color: #10b981; /* Emerald 500 */
      letter-spacing: -0.5px;
    }
    .content {
      padding: 20px;
      text-align: center;
    }
    p {
      font-size: 14px;
      color: #64748b;
      margin-bottom: 20px;
      line-height: 1.5;
    }
    button {
      background-color: #10b981;
      color: white;
      border: none;
      padding: 12px 20px;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      box-shadow: 0 4px 6px -1px rgba(16, 185, 129, 0.2), 0 2px 4px -1px rgba(16, 185, 129, 0.1);
      transition: all 0.2s;
    }
    button:hover {
      background-color: #059669; /* Emerald 600 */
      transform: translateY(-1px);
      box-shadow: 0 10px 15px -3px rgba(16, 185, 129, 0.3), 0 4px 6px -2px rgba(16, 185, 129, 0.1);
    }
    button:disabled {
      background-color: #94a3b8;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }
    #status {
      margin-top: 15px;
      font-size: 13px;
      font-weight: 500;
      color: #10b981;
      display: none;
    }
    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 1s ease-in-out infinite;
      margin-right: 8px;
      vertical-align: middle;
      display: none;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>YeildPulse Bot</h1>
  </div>
  <div class="content">
    <p>Click below to generate a top-notch yield report and automatically post it to your active X account.</p>
    <button id="postBtn">
      <span class="spinner" id="spinner"></span>
      <span id="btnText">Generate & Auto-Post</span>
    </button>
    <div id="status">Generating premium copy...</div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
